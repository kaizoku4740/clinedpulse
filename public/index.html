  <title>ClinEdPulse · Event Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600&display=swap" rel="stylesheet">

<body>

      <span class="brand-mark">C</span><span>ClinEd<span>Pulse</span></span>

    <nav aria-label="Main navigation">
      <a href="#dashboard" data-route="dashboard">⌂ <span>Overview</span></a>

  <main>

      <div><p class="eyebrow">EVENT OPERATIONS SYSTEM</p><h1 id="pageTitle">Good morning</h1></div>
      <div class="top-actions"><span class="today" id="today"></span><button class="button primary" data-action="new-speaker">+ Add speaker</button></div>

    <div id="toast" role="status" aria-live="polite"></div>
